<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This Summer | Maintenance</title>
    <style>
        /* Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden; /* Prevents scrolling during maintenance */
        }

        /* THE BLUR EFFECT: Everything in this container gets blurred */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100%;
            filter: blur(8px); /* Adjust this number to make it more or less blurry */
            pointer-events: none; /* Disables clicking on links underneath */
            user-select: none; /* Prevents highlighting text */
        }

        header {
            width: 100%;
            padding: 100px 0 50px 0;
            background: linear-gradient(180deg, #000000 0%, #301934 100%); 
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 20px rgba(102, 51, 153, 0.6);
        }

        .links a {
            display: block;
            color: #b39ddb;
            text-decoration: none;
            font-size: 1.2rem;
            margin: 15px 0;
        
        }

        .maintenance-card {
            background: rgba(48, 25, 52, 0.9); /* Smoky Purple Box */
            padding: 40px;
            border: 2px solid #6a1b9a;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(106, 27, 154, 0.5);
        }

        .maintenance-card h2 {
            margin: 0 0 10px 0;
            color: #ffffff;
            text-transform: uppercase;
        }

        .maintenance-card p {
            color: #b39ddb;
            margin-bottom: 20px;
        }

        footer {
            margin-top: auto;
            padding: 40px 0;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <header>
            <h1>This Summer</h1>
        </header>

        <div class="links">
            <a href="#">Status Page</a>
            <a href="#">Follow on X</a>
        </div>

        <footer>
            Black Eye Entertainment &copy; 2026
        </footer>
    </div>

</body>
</html>
