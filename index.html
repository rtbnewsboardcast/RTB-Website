<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This Summer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000; /* Jet Black */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* The Smoky Purple Gradient Header */
        header {
            width: 100%;
            padding: 100px 0 50px 0;
            background: linear-gradient(180deg, #000000 0%, #301934 100%); 
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
            /* Subtle glow for the smoky vibe */
            text-shadow: 0 0 20px rgba(102, 51, 153, 0.6);
        }

        /* Navigation Links */
        .links {
            margin-top: 40px;
        }

        .links a {
            display: block;
            color: #b39ddb; /* Light smoky purple */
            text-decoration: none;
            font-size: 1.2rem;
            margin: 15px 0;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #6a1b9a;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding-bottom: 30px;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
[![Better Stack Badge](https://uptime.betterstack.com/status-badges/v3/monitor/2gz0x.svg)](https://uptime.betterstack.com/?utm_source=status_badge)

    </header>

    </div>

    </footer>

</body>
</html>
