<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This Summer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        header {
            width: 100%;
            padding: 100px 0 50px 0;
            background: linear-gradient(180deg, #000000 0%, #301934 100%); 
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 20px rgba(102, 51, 153, 0.6);
        }

        .links {
            margin-top: 40px;
        }

        .links a {
            display: block;
            color: #b39ddb;
            text-decoration: none;
            font-size: 1.2rem;
            margin: 15px 0;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #6a1b9a;
        }

        /* Styling for the Status Badge */
        .status-badge {
            margin-top: 30px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .status-badge:hover {
            opacity: 1;
        }

        footer {
            margin-top: auto;
            padding: 40px 0;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header>
        <h1>This Summer</h1>
    </header>

    <div class="links">
        <a href="https://blackeyeent.betteruptime.com/" target="_blank">Status Page</a>
        <a href="https://x.com/MeadwridgeRP" target="_blank">Follow on X</a>
    </div>

    <div class="status-badge">
        <a href="https://blackeyeent.betteruptime.com/" target="_blank">
            <img src=<iframe src="https://blackeyeent.betteruptime.com/badge?theme=dark" width="250" height="30" frameborder="0" scrolling="no" style="color-scheme: normal"></iframe> />
        </a>
    </div>

    <footer>
        Meadowridge RP &copy; 2026
    </footer>

</body>
</html>
